name: Vexed
options:
  bundleIdPrefix: com.daviddef
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_BUNDLE_IDENTIFIER: com.daviddef.Vexed

targets:
  Vexed:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Vexed
        excludes:
          - "Resources/Info.plist"
    resources:
      - path: Vexed/Resources/Assets.xcassets
    info:
      path: Vexed/Resources/Info.plist
      properties:
        CFBundleDisplayName: Vexed
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
