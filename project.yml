name: Vexed
options:
  bundleIdPrefix: com.defranceski
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_BUNDLE_IDENTIFIER: com.defranceski.Vexed

targets:
  Vexed:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Vexed
        excludes:
          - "Resources/Info.plist"
    resources:
      - path: Vexed/Resources/Assets.xcassets
      - path: Vexed/Resources/easy_words.txt
      - path: Vexed/Resources/medium_words.txt
      - path: Vexed/Resources/words.txt
      - path: Vexed/Resources/dictionary.txt
      - path: Vexed/Resources/HowToPlay.md
    info:
      path: Vexed/Resources/Info.plist
      properties:
        CFBundleDisplayName: "VEXED!"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        ITSAppUsesNonExemptEncryption: false
    dependencies:
      - sdk: CoreServices.framework
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
